services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: spatial-validator-postgis
    profiles:
      - postgis
    environment:
      POSTGRES_DB: spatial_validator
      POSTGRES_USER: spatial_validator
      POSTGRES_PASSWORD: spatial_validator
    ports:
      - "5434:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data

volumes:
  postgis-data:
